project:
  name: Tour Search App
  stack:
    frontend: react-ts
    backend: none
    database: none
    styling: vanilla-css

guardians:
  universal:
    - ROOT
    - PM
    - TEAM_LEAD
    - QA
    - DEVOPS
    - ARCHITECT

  stack-adapters:
    - react-ts/FRONTEND_DEV
    - react-ts/UI_UX
    - react-ts/BUILD

sprints:
  - id: S00
    name: Project Setup
    points: 3
    path: sprints/S00.po
  - id: S01
    name: Tour Search
    points: 13
    path: sprints/S01.po

source-docs:
  - incoming/hr-letter.md
  - incoming/tech-task.md
  - incoming/api/

architecture:
  - layer: UI
    path: src/components/
    role: Presentational components
  - layer: Logic
    path: src/hooks/
    role: State and side effects
  - layer: Network
    path: src/services/
    role: API wrappers
  - layer: Types
    path: src/types/
    role: Shared interfaces
