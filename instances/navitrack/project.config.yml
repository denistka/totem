project:
  name: NaviTrack
  version: 1.0.0
  description: Fleet tracking PWA — React 19 PWA (primary), optional Tauri 2 desktop, WebGPU/WASM.
  stack:
    - react
    - typescript
    - vue3
    - tauri2
    - rust
    - wgpu
  # Canonical UI stack for React PWA (navitrack-apps/react-app). Tailwind + glass design system.
  ui_stack_ref: refs/app-ui-kit
  ui_stack_package: refs/app-ui-kit/package.json
  # UI/design planning: see README.md "UI & design sprints", core/DESIGN_SPRINT_GUIDE.md
  ui_design_docs:
    - README.md#ui--design-sprints
    - totem/core/DESIGN_SPRINT_GUIDE.md

paths:
  code: ../navitrack-apps
  react_app: ../navitrack-apps/src-client
  history: ../prompt-machine
  intel: ./intel

guardians:
  default:
    - ROOT
    - PM
    - QA
    - DEVOPS
    - ARCHITECT
  stack_adapters:
    - FRONTEND_DEV
    - RUST_DEV
    - WEBGL
    - WGPU
    - SLANG
