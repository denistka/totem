project:
  name: NaviTrack
  version: 1.0.0
  description: Fleet tracking mobile application — React 19 + Tauri 2 (iOS/Android).
  stack:
    - react19
    - typescript
    - tauri2
    - rust
    - firebase-fcm
    - biometrics
    - tailwindcss
    - zustand
    - leaflet
  ui_stack_ref: null
  ui_stack_package: null
  ui_design_docs:
    - README.md#ui--design-sprints
    - totem/core/DESIGN_SPRINT_GUIDE.md

paths:
  code: ../../../navitrack-mobile-apps
  react_app: ../../../navitrack-mobile-apps
  history: ../prompt-machine
  intel: ./intel

guardians:
  default:
    - ROOT
    - PM
    - QA
    - CODEMAP_QUALITY_ADVISOR
    - DEVOPS
    - ARCHITECT
  stack_adapters:
    - FRONTEND_DEV
    - RUST_DEV
    - MOBILE_TAURI
