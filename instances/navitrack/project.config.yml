project:
  name: NaviTrack
  version: 1.0.0
  stack:
    - vue3
    - typescript
    - tauri2
    - rust
    - wgpu
  # Canonical UI stack for React/port work (S42, navitrack-apps/react-app). Alignment: ROOT.ti.
  ui_stack_ref: refs/app-ui-kit
  ui_stack_package: refs/app-ui-kit/package.json

paths:
  code: ../navitrack-apps
  history: ../prompt-machine
  intel: ./intel

guardians:
  default:
    - ROOT
    - PM
    - TEAM_LEAD
    - QA
    - DEVOPS
    - ARCHITECT
  stack_adapters:
    - FRONTEND_DEV
    - RUST_DEV
    - WEBGL
    - WGPU
    - SLANG
