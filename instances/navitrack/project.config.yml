project:
  name: NaviTrack
  version: 1.0.0
  description: Fleet tracking PWA — React 19 PWA (primary), optional Tauri 2 desktop, WebGPU/WASM.
  stack:
    - react
    - typescript
    - tauri2
    - rust
    - webgpu
  ui_stack_ref: null
  ui_stack_package: null
  ui_design_docs:
    - README.md#ui--design-sprints
    - totem/core/DESIGN_SPRINT_GUIDE.md

paths:
  code: ../navitrack-apps
  react_app: ../navitrack-apps
  history: ../prompt-machine
  intel: ./intel

guardians:
  default:
    - ROOT
    - PM
    - QA
    - DEVOPS
    - ARCHITECT
  stack_adapters:
    - FRONTEND_DEV
    - RUST_DEV
    - WEBGL
    - WGPU
    - SLANG
