project:
  name: TaskBoard
  version: 1.0.0
  description: Collaborative task board with real-time updates using Vue, Node, and Supabase.
  stack:
    - vue3
    - typescript
    - node
    - supabase
  ui_stack_ref: refs/app-ui-kit

paths:
  code: ../../taskboard-supabase
  client: ../../taskboard-supabase/client
  server: ../../taskboard-supabase/server
  history: ./sprints
  intel: ./intel

guardians:
  default:
    - ROOT
    - PM
    - TEAM_LEAD
    - QA
    - DEVOPS
    - ARCHITECT
  stack_adapters:
    - FRONTEND_DEV
    - BACKEND_DEV
    - SUPABASE
