project:
  name: CROP Parts Services
  version: 1.0.0
  description: Bun monorepo of Hono microservices for parts, search, and integrations.
  stack:
    - bun
    - hono
    - typescript
    - cloud-run
    - microservices
    - biome

paths:
  code: ../../../CROP-parts-services
  history: .
  intel: ./intel

guardians:
  default:
    - ROOT
    - PM
    - QA
    - DEVOPS
    - ARCHITECT
  stack_adapters:
    - BUN_HONO_CLOUDRUN
    - BUN
    - HONO
    - TYPESCRIPT
    - CLOUD_RUN
    - BIOME
    - ARCHITECTURE_SCALE
    - SECURITY
