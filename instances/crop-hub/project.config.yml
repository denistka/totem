project:
  name: CROP Hub
  version: 1.0.0
  description: Operations and MCP orchestration hub with Python services on Cloud Run.
  stack:
    - python
    - mcp
    - cloud-run
    - security

paths:
  code: ../../../CROP-hub
  history: .
  intel: ./intel

guardians:
  default:
    - ROOT
    - PM
    - QA
    - DEVOPS
    - ARCHITECT
  stack_adapters:
    - PYTHON_CLOUDRUN_MCP
    - PYTHON_SERVICE
    - MCP
    - CLOUD_RUN
    - SECURITY
